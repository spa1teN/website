resolver 127.0.0.11 valid=10s ipv6=off;

# HTTP: ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name casparsadenius.de www.casparsadenius.de;
    client_max_body_size 500M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name casparsadenius.de www.casparsadenius.de;
    client_max_body_size 500M;

    ssl_certificate /etc/letsencrypt/live/casparsadenius.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/casparsadenius.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /staticfiles/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /admin/ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;
        set $django_upstream web:8000;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header REMOTE-USER $remote_user;
    }

    # Admin index page (custom management dashboard) — Django @login_required only,
    # no nginx basic auth (uses session from /diary/manage/ login)
    location /manage/ {
        set $django_upstream web:8000;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header REMOTE-USER $remote_user;
    }

    # Public diary pages (map, trip detail) – no auth
    location /diary/ {
        set $django_upstream web:8000;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Owner-only diary management – nginx basic auth + Django @login_required
    location /diary/manage/ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;
        set $django_upstream web:8000;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header REMOTE-USER $remote_user;
    }


    # Redirect Django's login/logout URLs (now handled by nginx basic auth)
    location /accounts/ {
        return 302 /admin/;
    }

    location / {
        set $django_upstream web:8000;
        proxy_pass http://$django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Tausendsassa Bot Webapp ──────────────────────────────────────────────────
server {
    listen 80;
    server_name tausendsassa.casparsadenius.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name tausendsassa.casparsadenius.de;

    ssl_certificate /etc/letsencrypt/live/tausendsassa.casparsadenius.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tausendsassa.casparsadenius.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Discord Activity CORS headers
    add_header Access-Control-Allow-Origin "https://discord.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-discord-*" always;

    location / {
        set $ts_upstream tausendsassa-webapp:8081;
        proxy_pass         http://$ts_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}

# ── Nextcloud ────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name nextcloud.casparsadenius.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Collabora macht interne WOPI-Anfragen via HTTP – direkt durchleiten
    location /index.php/apps/richdocuments/ {
        set $nc_upstream app:80;
        proxy_pass http://$nc_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /apps/richdocuments/ {
        set $nc_upstream app:80;
        proxy_pass http://$nc_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name nextcloud.casparsadenius.de;

    ssl_certificate /etc/letsencrypt/live/nextcloud.casparsadenius.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nextcloud.casparsadenius.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10G;

    location / {
        set $nc_upstream app:80;
        proxy_pass http://$nc_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

