# ── Collabora ────────────────────────────────────────────────────────────────
upstream collabora {
    server collabora:9980;
}

server {
    listen 80;
    server_name collabora.casparsadenius.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name collabora.casparsadenius.de;

    ssl_certificate /etc/letsencrypt/live/collabora.casparsadenius.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/collabora.casparsadenius.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location ^~ /browser {
        proxy_pass http://collabora;
        proxy_set_header Host $http_host;
    }

    location ^~ /hosting/discovery {
        proxy_pass http://collabora;
        proxy_set_header Host $http_host;
    }

    location ^~ /hosting/capabilities {
        proxy_pass http://collabora;
        proxy_set_header Host $http_host;
    }

    location ~ ^/cool/(.*)/ws$ {
        proxy_pass http://collabora;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_read_timeout 36000s;
    }

    location ~ ^/(c|l)ool {
        proxy_pass http://collabora;
        proxy_set_header Host $http_host;
    }

    location ^~ /cool/adminws {
        proxy_pass http://collabora;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_read_timeout 36000s;
    }
}