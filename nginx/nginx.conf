upstream django {
    server web:8000;
}

# HTTP: ACME challenge + redirect to HTTPS
server {
    listen 80;
    server_name casparsadenius.de www.casparsadenius.de;
    client_max_body_size 500M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name casparsadenius.de www.casparsadenius.de;
    client_max_body_size 500M;

    ssl_certificate /etc/letsencrypt/live/casparsadenius.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/casparsadenius.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /staticfiles/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /admin/ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header REMOTE-USER $remote_user;
    }

    location /diary/ {
        auth_basic "Restricted";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header REMOTE-USER $remote_user;
    }


    # Redirect Django's login/logout URLs (now handled by nginx basic auth)
    location /accounts/ {
        return 302 /admin/;
    }

    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Tausendsassa Bot Webapp ──────────────────────────────────────────────────
upstream tausendsassa {
    server tausendsassa-webapp:8081;
}

server {
    listen 80;
    server_name tausendsassa.casparsadenius.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name tausendsassa.casparsadenius.de;

    ssl_certificate /etc/letsencrypt/live/tausendsassa.casparsadenius.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tausendsassa.casparsadenius.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Discord Activity CORS headers
    add_header Access-Control-Allow-Origin "https://discord.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, x-discord-*" always;

    location / {
        proxy_pass         http://tausendsassa;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}

# ── Nextcloud ────────────────────────────────────────────────────────────────
upstream nextcloud {
    server app:80;
}

server {
    listen 80;
    server_name nextcloud.casparsadenius.de;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Collabora macht interne WOPI-Anfragen via HTTP – direkt durchleiten
    location /index.php/apps/richdocuments/ {
        proxy_pass http://nextcloud;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /apps/richdocuments/ {
        proxy_pass http://nextcloud;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name nextcloud.casparsadenius.de;

    ssl_certificate /etc/letsencrypt/live/nextcloud.casparsadenius.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nextcloud.casparsadenius.de/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10G;

    location / {
        proxy_pass http://nextcloud;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }
}

